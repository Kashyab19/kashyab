<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Garden</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
  canvas { display: block; cursor: crosshair; }
  #ui {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 10px; z-index: 10;
  }
  .btn {
    padding: 8px 18px; border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05); color: #ccc; border-radius: 20px;
    cursor: pointer; font-size: 13px; backdrop-filter: blur(10px);
    transition: all 0.2s;
  }
  .btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .btn.active { border-color: rgba(255,255,255,0.4); color: #fff; background: rgba(255,255,255,0.1); }
  #info {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.35); font-size: 13px; text-align: center;
    pointer-events: none; transition: opacity 1s;
  }
  #count {
    position: fixed; top: 20px; right: 20px;
    color: rgba(255,255,255,0.2); font-size: 12px;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">Click and drag to plant particles. Scroll to change brush size.</div>
<div id="count"></div>
<div id="ui">
  <div class="btn active" data-mode="fire">Fire</div>
  <div class="btn" data-mode="water">Water</div>
  <div class="btn" data-mode="nature">Nature</div>
  <div class="btn" data-mode="cosmic">Cosmic</div>
  <div class="btn" data-mode="rainbow">Rainbow</div>
  <div class="btn" onclick="clearAll()">Clear</div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const particles = [];
const MAX = 8000;
let mode = 'fire';
let brushSize = 20;
let mouseDown = false;
let mx = 0, my = 0;

const palettes = {
  fire:    [[255,60,20],[255,160,20],[255,220,50],[255,100,0],[200,30,0]],
  water:   [[20,80,255],[40,150,255],[100,200,255],[0,50,180],[60,220,255]],
  nature:  [[30,180,50],[80,220,60],[150,255,80],[20,120,30],[200,255,100]],
  cosmic:  [[180,50,255],[100,20,200],[255,80,200],[50,0,150],[220,150,255]],
  rainbow: [[255,50,50],[255,180,30],[50,255,80],[50,150,255],[200,50,255]],
};

class Particle {
  constructor(x, y, mode) {
    this.x = x + (Math.random() - 0.5) * brushSize;
    this.y = y + (Math.random() - 0.5) * brushSize;
    const palette = palettes[mode];
    const col = palette[Math.floor(Math.random() * palette.length)];
    this.r = col[0]; this.g = col[1]; this.b = col[2];
    this.life = 1;
    this.maxLife = 200 + Math.random() * 400;
    this.decay = 1 / this.maxLife;
    this.size = 1.5 + Math.random() * 3;
    this.mode = mode;

    const angle = Math.random() * Math.PI * 2;
    const speed = 0.3 + Math.random() * 1.2;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;

    if (mode === 'fire') { this.vy = -1 - Math.random() * 2; this.vx *= 0.5; }
    if (mode === 'water') { this.vy = 0.5 + Math.random(); this.vx *= 0.3; }
    if (mode === 'nature') { this.vy = -0.3 - Math.random() * 0.5; }
  }

  update() {
    this.life -= this.decay;

    switch (this.mode) {
      case 'fire':
        this.vx += (Math.random() - 0.5) * 0.15;
        this.vy -= 0.02;
        this.size *= 0.998;
        break;
      case 'water':
        this.vx += (Math.random() - 0.5) * 0.05;
        this.vy += 0.01;
        this.vx *= 0.99;
        break;
      case 'nature':
        this.vx += Math.sin(this.y * 0.01 + performance.now() * 0.001) * 0.03;
        this.vy += Math.cos(this.x * 0.01) * 0.01;
        break;
      case 'cosmic':
        const dx = W / 2 - this.x, dy = H / 2 - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy) + 1;
        this.vx += dx / dist * 0.02;
        this.vy += dy / dist * 0.02;
        this.vx += (Math.random() - 0.5) * 0.1;
        this.vy += (Math.random() - 0.5) * 0.1;
        break;
      case 'rainbow':
        this.vx += Math.sin(performance.now() * 0.002 + this.x * 0.005) * 0.08;
        this.vy += Math.cos(performance.now() * 0.002 + this.y * 0.005) * 0.08;
        const hueShift = (performance.now() * 0.1) % 360;
        const rgb = hslToRgb((hueShift + this.x * 0.3) % 360, 90, 60);
        this.r = rgb[0]; this.g = rgb[1]; this.b = rgb[2];
        break;
    }

    this.vx *= 0.98;
    this.vy *= 0.98;
    this.x += this.vx;
    this.y += this.vy;

    return this.life > 0;
  }

  draw() {
    const a = this.life * 0.8;
    ctx.fillStyle = `rgba(${this.r},${this.g},${this.b},${a})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
    ctx.fill();

    if (this.life > 0.5) {
      const ga = (this.life - 0.5) * 0.3;
      ctx.shadowColor = `rgba(${this.r},${this.g},${this.b},${ga})`;
      ctx.shadowBlur = this.size * 4;
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }
}

function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
  return [Math.round(f(0) * 255), Math.round(f(8) * 255), Math.round(f(4) * 255)];
}

function emit(x, y) {
  const count = Math.min(5, MAX - particles.length);
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x, y, mode));
  }
}

function clearAll() {
  particles.length = 0;
}

function animate() {
  ctx.fillStyle = 'rgba(10,10,15,0.08)';
  ctx.fillRect(0, 0, W, H);

  if (mouseDown) emit(mx, my);

  for (let i = particles.length - 1; i >= 0; i--) {
    if (!particles[i].update()) {
      particles.splice(i, 1);
    } else {
      particles[i].draw();
    }
  }

  document.getElementById('count').textContent = particles.length + ' particles';
  requestAnimationFrame(animate);
}

canvas.addEventListener('mousedown', e => { mouseDown = true; mx = e.clientX; my = e.clientY; emit(mx, my); });
canvas.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
canvas.addEventListener('mouseup', () => mouseDown = false);
canvas.addEventListener('mouseleave', () => mouseDown = false);

canvas.addEventListener('touchstart', e => { e.preventDefault(); mouseDown = true; mx = e.touches[0].clientX; my = e.touches[0].clientY; emit(mx, my); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); mx = e.touches[0].clientX; my = e.touches[0].clientY; }, { passive: false });
canvas.addEventListener('touchend', () => mouseDown = false);

canvas.addEventListener('wheel', e => {
  brushSize = Math.max(5, Math.min(100, brushSize + (e.deltaY > 0 ? 5 : -5)));
});

document.querySelectorAll('.btn[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.btn[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
  });
});

setTimeout(() => {
  document.getElementById('info').style.opacity = '0';
}, 4000);

animate();
</script>
</body>
</html>
